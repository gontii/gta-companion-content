name: Deploy web app to Cloudflare Pages

# Deploys the pre-built gtacompanion Expo web export committed under
# web-deploy/ to the companion-for-gta-online Pages project. The workflow
# lives here because the Cloudflare secrets (already used for the KV publish)
# are configured in this repo.
#
# Why a committed bundle instead of building from source: gontii/gtacompanion
# is private, so this repo's GITHUB_TOKEN cannot check it out (run #1 failed
# on exactly that). To build from source instead, add a PAT secret with read
# access to gtacompanion and restore an actions/checkout step using it.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check the staged bundle exists
        run: test -f web-deploy/index.html || { echo "web-deploy/ is missing — commit a fresh 'npm run export:web' output from gtacompanion first." >&2; exit 1; }

      # Deploying to any other branch name would create a preview deployment
      # instead of updating production, so read the real production branch.
      - name: Resolve Pages production branch
        id: pages
        run: |
          PROD_BRANCH="$(curl -sf -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/companion-for-gta-online" \
            | jq -re '.result.production_branch')" || {
              echo "Could not read the Pages project's production branch — the API token may lack Cloudflare Pages permissions." >&2
              exit 1
            }
          echo "branch=$PROD_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages (production)
        run: npx wrangler pages deploy web-deploy --project-name companion-for-gta-online --branch "${{ steps.pages.outputs.branch }}" --commit-dirty=true
